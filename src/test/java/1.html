<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Регистрация студентов Q34</title>
</head>
<body>
<h1>ФОРМА РЕГИСТРАЦИИ</h1>
<form id="registrationForm" class="form-container">

    <label for="firstName">ИМЯ</label>
    <input id="firstName" name="firstName" class="input-field" type="text" placeholder="Введите имя">

    <label for="email">ПОЧТА</label>
    <input id="email" name="email" class="input-field" type="email" placeholder="Введите email">

    <label for="password">ПАРОЛЬ</label>
    <input id="password" name="password" class="input-field" type="password" placeholder="Введите пароль">

    <button id="registerBtn" class="btn primary-btn" type="submit">Зарегистрироваться</button>
</form>

<a href="/login" id="loginLink" class="nav-link">УЖЕ ЕСТЬ РЕГИСТРАЦИЯ? ВОЙТИ</a>
</body>
</html>
